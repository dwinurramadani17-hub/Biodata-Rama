<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio Dwi</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0; padding: 0;
      background: #f9f9f9;
      color: #333;
      transition: background 0.5s, color 0.5s;
    }
    nav {
      background: #0077b6;
      padding: 15px 30px;
      display: flex; justify-content: space-between; align-items: center;
      position: fixed; top: 0; left: 0; right: 0;
      color: #fff; z-index: 1000;
    }
    nav a { color: #fff; text-decoration: none; margin: 0 10px; font-weight: 600; }
    nav a:hover { text-decoration: underline; }
    .hero {
      height: 100vh;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      background: linear-gradient(-45deg, #74ebd5, #ACB6E5, #f9f9f9, #e0c3fc);
      background-size: 400% 400%; animation: gradientMove 10s ease infinite;
      text-align: center; padding: 0 20px;
    }
    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }
    .hero h1 { font-size: 2.5em; margin-bottom: 10px; }
    .hero p { font-size: 1.2em; margin-bottom: 20px; }
    .btn {
      padding: 12px 25px; border: none; border-radius: 8px;
      background: #0077b6; color: #fff; font-size: 16px; cursor: pointer;
      transition: transform 0.3s ease;
    }
    .btn:hover { transform: scale(1.05); background: #005f87; }
    section { padding: 80px 20px; text-align: center; opacity: 0; transform: translateY(50px); transition: all 1s ease; }
    section.visible { opacity: 1; transform: translateY(0); }
    footer {
      background: #0077b6; color: #fff; text-align: center; padding: 20px;
    }
    footer a { color: #fff; margin: 0 10px; }
    body.dark { background: #121212; color: #eee; }
    body.dark nav { background: #222; }
    body.dark footer { background: #222; }
  </style>
</head>
<body>
  <nav>
    <div><strong>Dwi Portfolio</strong></div>
    <div>
      <a href="#home">Home</a>
      <a href="#biodata">Biodata</a>
      <a href="#kontak">Kontak</a>
      <a href="javascript:void(0)" onclick="toggleDarkMode()">🌙/☀️</a>
    </div>
  </nav>

  <section class="hero" id="home">
    <h1>Halo, Saya Dwi</h1>
    <p>Calon Web Developer dari Palangka Raya</p>
    <button class="btn" onclick="document.getElementById('biodata').scrollIntoView({behavior:'smooth'})">Lihat Biodata</button>
  </section>

  <section id="biodata">
    <h2>Biodata</h2>
    <p><strong>Nama:</strong> Dwi Nur Ramadhani Subagyo</p>
    <p><strong>Hobi:</strong> Main Game & Musik</p>
    <p><strong>Cita-cita:</strong> Web Developer</p>
  </section>

  <section id="kontak">
    <h2>Kontak</h2>
    <p>Email: dwinurramadani17@gmail.com</p>
    <p>Instagram: <a href="https://instagram.com/auzo_wb" target="_blank">@auzo_wb</a></p>
  </section>

  <footer>
    <p>&copy; 2026 Dwi Portfolio</p>
  </footer>

  <script>
    // Fade-in saat scroll
    function onScroll() {
      document.querySelectorAll('section').forEach(el => {
        const rect = el.getBoundingClientRect();
        if (rect.top < window.innerHeight - 50) {
          el.classList.add('visible');
        }
      });
    }
    window.addEventListener('scroll', onScroll);
    window.addEventListener('load', onScroll);

    // Dark mode toggle
    function toggleDarkMode() {
      document.body.classList.toggle("dark");
    }
  </script>
</body>
</html>
